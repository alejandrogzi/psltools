  <circle cx="100" cy="100" r="92" fill="none" stroke="#f8f5ff" stroke-width="8"/>
  
  <rect x="38" y="48" width="52" height="104" rx="14" ry="14" fill="none" stroke="#C06C84" stroke-width="18" stroke-linejoin="round"/>
  <rect x="42" y="52" width="44" height="96" rx="12" ry="12" fill="none" stroke="#E8B4C8" stroke-width="6" stroke-linejoin="round"/>
  
  <rect x="110" y="48" width="52" height="104" rx="14" ry="14" fill="none" stroke="#5A6A9E" stroke-width="18" stroke-linejoin="round"/>
  <rect x="114" y="52" width="44" height="96" rx="12" ry="12" fill="none" stroke="#A3B4E0" stroke-width="6" stroke-linejoin="round"/>
  
