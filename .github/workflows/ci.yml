name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch: {}

jobs:
  fmt-clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (default)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "" # default
          - "--no-default-features --features mmap,gzip"
          - "--no-default-features --features mmap,index"
          - "--no-default-features --features mmap,serde"
          - "--all-features"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test ${{ matrix.features }}
        run: cargo test --all-targets ${{ matrix.features }}

      - name: cargo test (doctests) ${{ matrix.features }}
        run: cargo test --doc ${{ matrix.features }}
